version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_ORCHESTRATOR_URL=http://orchestrator:8001/process_journal
      - NEXT_PUBLIC_MCP_URL=http://mcp_server:8000
    depends_on:
      - orchestrator
      - mcp_server
    command: npm run dev
    # Restart policy for dev
    restart: unless-stopped

  mcp_server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENCRYPTION_PASSPHRASE=${ENCRYPTION_PASSPHRASE}
      - STUDENT_NAME=${STUDENT_NAME}
      - EXAM_TYPE=${EXAM_TYPE}
      - EXAM_DATE=${EXAM_DATE}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - ENCRYPTION_PASSPHRASE=${ENCRYPTION_PASSPHRASE}
    command: uvicorn backend.api.orchestrator_api:app --host 0.0.0.0 --port 8001
    depends_on:
      - mcp_server
    restart: unless-stopped

networks:
  default:
    driver: bridge

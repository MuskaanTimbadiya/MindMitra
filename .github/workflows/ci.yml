name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run unit tests (if any)
        run: npm test || echo "No unit tests defined"

      - name: Build project
        run: npm run build

      - name: Start preview and run E2E tests
        run: |
          npm run preview &
          npx wait-on http://127.0.0.1:4173 --timeout 60000
          npm run test:e2e
        shell: bash